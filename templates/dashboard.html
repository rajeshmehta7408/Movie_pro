{% extends "base.html" %}

{% block content %}

<h2>Prediction History</h2>

<table border="1" style="width:100%; background:#1e293b;">

<tr>
<th>ID</th>
<th>Genre</th>
<th>Budget</th>
<th>Runtime</th>
<th>Rating</th>
<th>Status</th>
</tr>

{% for item in history %}

<tr>

<td>{{ item[0] }}</td>
<td>{{ item[2] }}</td>
<td>{{ item[3] }}</td>
<td>{{ item[4] }}</td>
<td>{{ item[5] }}</td>
<td>{{ item[6] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
